name: hampshire

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - hampshire_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  adminer:
    image: adminer:4
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  hampshire_mysql_data:
